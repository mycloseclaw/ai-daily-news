<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily News - 每日 AI 资讯</title>
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
    <!-- 头部 -->
    <header>
        <div class="header-content">
            <div class="logo">🤖 AI Daily News</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索新闻...">
            </div>
            <div class="header-controls">
                <button id="themeToggle" class="theme-btn" title="切换主题">🌙</button>
                <input type="date" id="datePicker" title="选择日期">
                <button id="loginBtn" onclick="openModal('loginModal')">登录</button>
                <button id="registerBtn" onclick="openModal('registerModal')">注册</button>
                <div id="userInfo" style="display: none;">
                    <span id="usernameDisplay"></span>
                    <button id="logoutBtn">退出</button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main>
        <div id="newsContainer">
            <div class="loading">加载中...</div>
        </div>

        <!-- 留言板 -->
        <section class="message-board">
            <h2>留言板</h2>
            <form id="messageForm">
                <textarea id="messageText" placeholder="写下你的评论..." required></textarea>
                <button type="submit">发布留言</button>
            </form>
            <div id="messageList"></div>
        </section>
    </main>

    <!-- 登录模态框 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>登录</h2>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="用户名" required>
                <input type="password" id="loginPassword" placeholder="密码" required>
                <button type="submit">登录</button>
            </form>
            <p>还没有账号？<a href="#" onclick="switchToRegister()">立即注册</a></p>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2>注册</h2>
            <form id="registerForm">
                <input type="text" id="registerUsername" placeholder="用户名（至少3个字符）" required>
                <input type="password" id="registerPassword" placeholder="密码（至少6个字符）" required>
                <input type="password" id="registerConfirmPassword" placeholder="确认密码" required>
                <button type="submit">注册</button>
            </form>
            <p>已有账号？<a href="#" onclick="switchToLogin()">立即登录</a></p>
        </div>
    </div>

    <!-- 回到顶部按钮 -->
    <button id="backToTop" class="back-to-top" title="回到顶部">↑</button>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 2026 AI Daily News. All rights reserved.</p>
    </footer>

    <!-- 合并后的脚本（用于本地测试） -->
    <script src="bundle.js"></script>
</body>
</html>
